services:
  # ===== BACKEND (Python / Flask) =====
  - type: web
    name: construccionfinal
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && cd ../frontend && npm install && npm run build
    startCommand: gunicorn run:app --workers 2 --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: BACKEND_URL
        value: https://construccionfinal.onrender.com
      - key: FRONTEND_URL
        value: https://construccionfinal.onrender.com

  # ===== FRONTEND (Vue / Static Site) =====
  - type: web
    name: construccionfinal-1
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://construccionfinal.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
